<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Think Fast — Offline</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 2rem;
        }
        .container {
            max-width: 400px;
        }
        .icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }
        h1 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            color: #ffd700;
        }
        p {
            color: #aaa;
            margin-bottom: 1.5rem;
            line-height: 1.5;
        }
        button {
            background: #e94560;
            color: #fff;
            border: none;
            padding: 0.75rem 2rem;
            border-radius: 2rem;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
        }
        button:hover { background: #ff6b81; }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">🏁</div>
        <h1>Pit Stop!</h1>
        <p>Looks like you're offline and this page isn't cached yet. Connect to the internet and try again!</p>
        <button onclick="location.reload()">Try Again</button>
    </div>
</body>
</html>
